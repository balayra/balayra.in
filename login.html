<!DOCTYPE html>
<html>
<head>
    <title>BALAYRA Login</title>
</head>
<body>

<h2>Producer Login</h2>

<input type="text" id="username" placeholder="Producer ID"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<script>

// 🔐 Dummy Database (Future में replace होगा)
let users = [
    {id: "PR001", pass: "1234", name: "Ramesh", role: "producer"},
    {id: "PR002", pass: "5678", name: "Suresh", role: "producer"},
    {id: "MM001", pass: "1111", name: "Mahesh", role: "mart"}
];

function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    let found = users.find(u => u.id === user && u.pass === pass);

    if(found) {
        // पूरा user object save
        localStorage.setItem("userData", JSON.stringify(found));

        // Role based redirect (future ready)
        if(found.role === "producer") {
            window.location.href = "dashboard.html";
        } else if(found.role === "mart") {
            window.location.href = "dashboard.html";
        }

    } else {
        alert("Invalid ID or Password");
    }
}

</script>

</body>
</html>
